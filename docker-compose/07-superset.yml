# 阶段 7: 完整栈 + Superset
#
# 启动:
#   docker compose -f docker-compose/06-airflow.yml down
#   docker compose -f docker-compose/07-superset.yml up -d --build
#
# Web UIs:
#   Superset:    http://localhost:8088  (admin / admin)
#   Trino:       http://localhost:8080
#   MinIO:       http://localhost:9001

x-superset-common: &superset-common
  build:
    context: .
    dockerfile: Dockerfile.superset
  image: lakehouse-superset:latest
  environment: &superset-env
    SUPERSET_SECRET_KEY: lakehouse-learning-key-do-not-use-in-prod
    SUPERSET_LOAD_EXAMPLES: "no"
    PYTHONPATH: /app/pythonpath
  volumes:
    - ./superset-conf/superset_config.py:/app/pythonpath/superset_config.py:ro
  depends_on:
    postgres-superset:
      condition: service_healthy

services:
  # ─── 数据湖底层 ──────────────────────────────
  minio:
    image: minio/minio:latest
    container_name: lakehouse-minio
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    volumes:
      - minio-data:/data
    command: server /data --console-address ":9001"
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 5s
      timeout: 5s
      retries: 5

  minio-init:
    image: minio/mc:latest
    container_name: lakehouse-minio-init
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio:9000 minioadmin minioadmin;
      mc mb -p local/warehouse || true;
      "

  iceberg-rest:
    image: apache/iceberg-rest-fixture:latest
    container_name: lakehouse-iceberg-rest
    depends_on:
      minio:
        condition: service_healthy
    ports:
      - "8181:8181"
    environment:
      CATALOG_WAREHOUSE: s3://warehouse/
      CATALOG_IO__IMPL: org.apache.iceberg.aws.s3.S3FileIO
      CATALOG_S3_ENDPOINT: http://minio:9000
      CATALOG_S3_PATH__STYLE__ACCESS: "true"
      AWS_ACCESS_KEY_ID: minioadmin
      AWS_SECRET_ACCESS_KEY: minioadmin
      AWS_REGION: us-east-1

  spark:
    image: lakehouse-spark:latest
    container_name: lakehouse-spark
    depends_on:
      iceberg-rest:
        condition: service_started
    ports:
      - "4040:4040"
    volumes:
      - ../jobs/spark:/jobs
      - ../data:/data
      - ./spark-conf/spark-defaults.conf:/opt/spark/conf/spark-defaults.conf:ro
    command: tail -f /dev/null
    environment:
      SPARK_LOCAL_HOSTNAME: localhost
      PYSPARK_PYTHON: python3
      AWS_REGION: us-east-1
      AWS_ACCESS_KEY_ID: minioadmin
      AWS_SECRET_ACCESS_KEY: minioadmin

  trino:
    image: trinodb/trino:latest
    container_name: lakehouse-trino
    depends_on:
      iceberg-rest:
        condition: service_started
    ports:
      - "8080:8080"
    volumes:
      - ./trino-conf/catalog:/etc/trino/catalog:ro

  # ─── Superset 元数据库 ──────────────────────
  postgres-superset:
    image: postgres:16
    container_name: lakehouse-postgres-superset
    environment:
      POSTGRES_USER: superset
      POSTGRES_PASSWORD: superset
      POSTGRES_DB: superset
    volumes:
      - postgres-superset-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "superset"]
      interval: 5s
      retries: 5

  # ─── 一次性初始化 ────────────────────────────
  superset-init:
    <<: *superset-common
    container_name: lakehouse-superset-init
    command:
      - /bin/bash
      - -c
      - |
        superset db upgrade
        superset fab create-admin --username admin --firstname Admin --lastname User \
            --email admin@example.com --password admin || true
        superset init
        echo "✅ Superset init done"

  # ─── Superset Web ────────────────────────────
  superset:
    <<: *superset-common
    container_name: lakehouse-superset
    command:
      - /bin/bash
      - -c
      - |
        /usr/bin/run-server.sh
    ports:
      - "8088:8088"
    depends_on:
      postgres-superset:
        condition: service_healthy
      superset-init:
        condition: service_completed_successfully

volumes:
  minio-data:
  postgres-superset-data:
