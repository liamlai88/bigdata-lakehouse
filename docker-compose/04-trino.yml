# 阶段 4：完整栈 — MinIO + Iceberg REST + Spark + Trino
#
# 启动:
#   docker compose -f docker-compose/03-spark.yml down
#   docker compose -f docker-compose/04-trino.yml up -d --build
#
# Trino UI:  http://localhost:8080  (用户名随便填，比如 admin)
# Trino CLI: docker compose -f docker-compose/04-trino.yml exec trino trino

services:
  minio:
    image: minio/minio:latest
    container_name: lakehouse-minio
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    volumes:
      - minio-data:/data
    command: server /data --console-address ":9001"
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 5s
      timeout: 5s
      retries: 5

  minio-init:
    image: minio/mc:latest
    container_name: lakehouse-minio-init
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio:9000 minioadmin minioadmin;
      mc mb -p local/lakehouse || true;
      mc mb -p local/warehouse || true;
      "

  iceberg-rest:
    image: apache/iceberg-rest-fixture:latest
    container_name: lakehouse-iceberg-rest
    depends_on:
      minio:
        condition: service_healthy
    ports:
      - "8181:8181"
    # 注意：apache/iceberg-rest-fixture 默认用内存 SQLite，down/up 会丢 catalog 元数据
    # 想持久化需要换 Postgres 后端 (生产场景)，本地学习每次 ETL 重建即可
    environment:
      CATALOG_WAREHOUSE: s3://warehouse/
      CATALOG_IO__IMPL: org.apache.iceberg.aws.s3.S3FileIO
      CATALOG_S3_ENDPOINT: http://minio:9000
      CATALOG_S3_PATH__STYLE__ACCESS: "true"
      AWS_ACCESS_KEY_ID: minioadmin
      AWS_SECRET_ACCESS_KEY: minioadmin
      AWS_REGION: us-east-1

  spark:
    build:
      context: .
      dockerfile: Dockerfile.spark
    image: lakehouse-spark:latest
    container_name: lakehouse-spark
    depends_on:
      iceberg-rest:
        condition: service_started
    ports:
      - "4040:4040"
    volumes:
      - ../jobs/spark:/jobs
      - ../data:/data
      - ./spark-conf/spark-defaults.conf:/opt/spark/conf/spark-defaults.conf:ro
    command: tail -f /dev/null
    environment:
      SPARK_LOCAL_HOSTNAME: localhost
      PYSPARK_PYTHON: python3
      AWS_REGION: us-east-1
      AWS_ACCESS_KEY_ID: minioadmin
      AWS_SECRET_ACCESS_KEY: minioadmin

  trino:
    image: trinodb/trino:latest
    container_name: lakehouse-trino
    depends_on:
      iceberg-rest:
        condition: service_started
    ports:
      - "8080:8080"   # Trino HTTP + Web UI
    volumes:
      # 挂入 catalog 配置；Trino 启动时会自动扫描 /etc/trino/catalog/*.properties
      - ./trino-conf/catalog:/etc/trino/catalog:ro

volumes:
  minio-data:
