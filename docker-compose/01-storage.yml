# 阶段 1：起一个本地 S3 (MinIO)
#
# 用法：
#   cd ~/Calude-Learning/bigdata-lakehouse
#   docker compose -f docker-compose/01-storage.yml up -d
#   # 控制台: http://localhost:9001  (账号 minioadmin / 密码 minioadmin)
#   # S3 API: http://localhost:9000
#
# 关停：
#   docker compose -f docker-compose/01-storage.yml down
#   # 加 -v 会删数据卷，慎用：docker compose ... down -v

services:
  minio:
    image: minio/minio:latest
    container_name: lakehouse-minio
    ports:
      - "9000:9000"   # S3 API
      - "9001:9001"   # Web 控制台
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    volumes:
      - minio-data:/data
    command: server /data --console-address ":9001"
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 5s
      timeout: 5s
      retries: 5

  # 启动时自动建好我们要用的 bucket，省得手点
  minio-init:
    image: minio/mc:latest
    container_name: lakehouse-minio-init
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio:9000 minioadmin minioadmin;
      mc mb -p local/lakehouse || true;
      mc mb -p local/warehouse || true;
      mc ls local;
      echo '✅ buckets ready: lakehouse, warehouse';
      "

volumes:
  minio-data:
