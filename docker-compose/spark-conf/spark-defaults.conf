# Spark 默认配置 — 预先绑定 Iceberg + MinIO，省得每个脚本都写一遍

# Iceberg 扩展
spark.sql.extensions  org.apache.iceberg.spark.extensions.IcebergSparkSessionExtensions

# 注册 "lakehouse" catalog，类型 REST
spark.sql.catalog.lakehouse                        org.apache.iceberg.spark.SparkCatalog
spark.sql.catalog.lakehouse.type                   rest
spark.sql.catalog.lakehouse.uri                    http://iceberg-rest:8181
spark.sql.catalog.lakehouse.io-impl                org.apache.iceberg.aws.s3.S3FileIO
spark.sql.catalog.lakehouse.s3.endpoint            http://minio:9000
spark.sql.catalog.lakehouse.s3.access-key-id       minioadmin
spark.sql.catalog.lakehouse.s3.secret-access-key   minioadmin
spark.sql.catalog.lakehouse.s3.path-style-access   true
spark.sql.catalog.lakehouse.s3.region              us-east-1
spark.sql.catalog.lakehouse.client.region          us-east-1
spark.sql.catalog.lakehouse.rest.signing-region    us-east-1

# 把 lakehouse 设成默认 catalog，写 SQL 不用每次加前缀
spark.sql.defaultCatalog                           lakehouse

# Driver / Executor 内存（local 模式下 driver 就是 executor）
spark.driver.memory                                2g
spark.executor.memory                              2g

# AQE 默认开（Spark 3.2+ 默认就是 true，这里显式写出来强调）
spark.sql.adaptive.enabled                         true
spark.sql.adaptive.coalescePartitions.enabled      true
spark.sql.adaptive.skewJoin.enabled                true

# 自动广播 Join 的阈值：< 10MB 的表自动广播
spark.sql.autoBroadcastJoinThreshold               10485760

# 默认 shuffle 后分区数
spark.sql.shuffle.partitions                       16
