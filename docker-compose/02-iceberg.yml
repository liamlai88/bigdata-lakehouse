# 阶段 2：MinIO + Iceberg REST Catalog
#
# 用法（先关掉 01）:
#   docker compose -f docker-compose/01-storage.yml down
#   docker compose -f docker-compose/02-iceberg.yml up -d
#
# 服务:
#   - MinIO         http://localhost:9000  (S3)   控制台 :9001
#   - Iceberg REST  http://localhost:8181        (REST Catalog API)

services:
  minio:
    image: minio/minio:latest
    container_name: lakehouse-minio
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    volumes:
      - minio-data:/data
    command: server /data --console-address ":9001"
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 5s
      timeout: 5s
      retries: 5

  minio-init:
    image: minio/mc:latest
    container_name: lakehouse-minio-init
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio:9000 minioadmin minioadmin;
      mc mb -p local/lakehouse || true;
      mc mb -p local/warehouse || true;
      echo '✅ buckets ready';
      "

  # Apache Iceberg 官方 REST Catalog (用 SQLite 后端做元数据存储)
  # 暴露 8181 端口给 pyiceberg / Spark / Trino 连接
  iceberg-rest:
    image: apache/iceberg-rest-fixture:latest
    container_name: lakehouse-iceberg-rest
    depends_on:
      minio:
        condition: service_healthy
    ports:
      - "8181:8181"
    environment:
      # 数据仓库根路径（实际数据写到 MinIO 的 warehouse bucket）
      CATALOG_WAREHOUSE: s3://warehouse/
      # 用 S3 FileIO 读写 MinIO
      CATALOG_IO__IMPL: org.apache.iceberg.aws.s3.S3FileIO
      CATALOG_S3_ENDPOINT: http://minio:9000
      CATALOG_S3_PATH__STYLE__ACCESS: "true"
      AWS_ACCESS_KEY_ID: minioadmin
      AWS_SECRET_ACCESS_KEY: minioadmin
      AWS_REGION: us-east-1

volumes:
  minio-data:
